<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fractal Drift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{--glass:rgba(20,24,38,.46);--line:rgba(255,255,255,.18);--text:#eef1ff}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:#05070d;color:var(--text);overflow:hidden}
    canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
    .ui{position:fixed;left:18px;top:18px;z-index:10;backdrop-filter: blur(16px) saturate(140%);background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:14px 14px 12px;min-width:290px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
    h1{margin:0 0 4px;font-size:18px;font-weight:800;letter-spacing:.3px}
    .sub{opacity:.8;font-size:12px;margin-bottom:10px}
    .row{display:flex;align-items:center;gap:10px;margin:8px 0}
    .row label{font-size:12px;opacity:.9;min-width:92px}
    input[type=range]{width:150px}
    button{cursor:pointer;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff;padding:7px 10px;font-weight:600}
    button:hover{background:rgba(255,255,255,.16)}
    .pill{padding:4px 8px;border-radius:999px;background:rgba(130,90,255,.26);font-size:11px;border:1px solid rgba(190,170,255,.35)}
    .hint{position:fixed;right:18px;bottom:16px;z-index:10;font-size:12px;opacity:.8;background:var(--glass);border:1px solid var(--line);padding:8px 10px;border-radius:999px;backdrop-filter:blur(10px)}
    .coords{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;opacity:.8;margin-top:6px}
  </style>
</head>
<body>
  <canvas id="fractal"></canvas>

  <div class="ui">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div>
        <h1>Fractal Drift</h1>
        <div class="sub">Explore infinite Mandelbrot landscapes</div>
      </div>
      <span class="pill">LIVE</span>
    </div>

    <div class="row">
      <label>Ambient sound</label>
      <button id="audioToggle">Enable</button>
    </div>
    <div class="row">
      <label>Volume</label>
      <input id="volume" type="range" min="0" max="1" step="0.01" value="0.35" />
    </div>
    <div class="row">
      <label>Color phase</label>
      <input id="phase" type="range" min="0" max="6.283" step="0.001" value="1.2" />
    </div>
    <div class="coords" id="coords"></div>
  </div>

  <div class="hint">Drag to pan · Scroll / pinch to zoom · Double click to dive</div>

  <script src="main.js"></script>
</body>
</html>
